<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>관리자 패널 - 2026 데이터 무결성 & 복구 통합본</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=2"></script>
    <script src="ai-service.js?v=2"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--bg);
            padding: 40px;
        }

        .card {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        button {
            padding: 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
        }

        #analyzeBtn {
            background: var(--primary);
            color: white;
        }

        #saveBtn {
            background: var(--success);
            color: white;
            display: none;
            margin-top: 20px;
        }

        .progress-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 20px;
            margin: 10px 0 20px 0;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a29bfe);
            transition: 0.3s var(--ease);
        }

        #status {
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            background: #eee;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        #preview {
            background: #272822;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            font-size: 0.8rem;
            overflow-x: auto;
            max-height: 300px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div style="margin-bottom: 20px;">
            <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:bold; font-size:1.1rem;">← 메인
                홈으로 돌아가기</a>
        </div>
        <h2>🚀 콘텐츠 관리 시스템 (Premium 2.5 Flash)</h2>
        <input type="text" id="t" placeholder="제목을 입력하세요">
        <textarea id="r" placeholder="분석할 문장을 입력하세요 (엔터로 문단 구분 가능)"></textarea>

        <button id="analyzeBtn" onclick="startProcess()">AI 문장 분석 시작</button>

        <div class="progress-container" id="progContainer">
            <div class="progress-bar" id="progBar"></div>
        </div>

        <div id="status">상태: 시스템 대기 중 (Project: 728944415231)</div>

        <pre id="preview"></pre>
    </div>

    <script>
        async function startProcess() {
            const title = document.getElementById('t').value || "제목 없음";
            const raw_text = document.getElementById('r').value.trim();
            const log = document.getElementById('status');
            const progContainer = document.getElementById('progContainer');
            const progBar = document.getElementById('progBar');
            const preview = document.getElementById('preview');

            if (!raw_text) return alert("내용을 입력해주세요.");

            progContainer.style.display = 'block';
            progBar.style.width = '30%';
            preview.style.display = 'none';

            log.innerText = "⏳ 1단계: 뼈대 저장 중...";
            log.style.backgroundColor = "#eee";

            // 빈 초기 객체만 할당하여 Supabase Payload 초과 오류 (Failed to fetch) 방지
            let initJson = { sequence: [], dictionary: {}, last_idx: -1, status: "analyzing" };

            try {
                const { data, error } = await sb.from('reading_materials').insert([{
                    title: title,
                    raw_text: raw_text,
                    processed_json: initJson
                }]).select();

                if (error) throw error;
                const newId = data[0].id;

                progBar.style.width = '50%';
                log.innerText = "✅ 2단계: 저장 완료! 이제 백그라운드에서 문단별 AI 분석을 시작합니다.\n페이지를 닫아도 뷰어(Reviewer)에서 자동으로 이어할 수 있습니다.";
                log.style.backgroundColor = "#dcfce7";

                // 백그라운드 분석 시작
                runBackgroundAnalysis(newId, raw_text);

            } catch (err) {
                log.innerText = "❌ 저장 오류: " + err.message;
                log.style.backgroundColor = "#ffdce0";
                progBar.style.width = '0%';
            }
        }

        async function runBackgroundAnalysis(id, text) {
            const progBar = document.getElementById('progBar');
            const log = document.getElementById('status');
            const preview = document.getElementById('preview');


            const lines = text.split('\n');
            const timestamp = Date.now();
            const CONCURRENCY = 5; // 5문단 동시 처리

            for (let i = 0; i < lines.length; i += CONCURRENCY) {
                const batchIndices = [];
                for (let j = 0; j < CONCURRENCY && i + j < lines.length; j++) {
                    batchIndices.push(i + j);
                }

                const { data: currentData } = await sb.from('reading_materials').select('processed_json').eq('id', id).single();
                let currentJson = currentData.processed_json;

                if (!currentJson || currentJson.status === "completed") return;
                if (currentJson.status === "failed") return;

                const maxProgress = Math.min(i + CONCURRENCY, lines.length);
                if (log) log.innerText = `⏳ 병렬 분석 중... (${maxProgress}/${lines.length} 문단)`;
                if (progBar) progBar.style.width = Math.floor((maxProgress / lines.length) * 100) + '%';

                // Promise.all로 5개 동시 처리
                const promises = batchIndices.map(async (idx) => {
                    const line = lines[idx].trim();
                    if (currentJson.last_idx >= idx) return { idx, success: true, skipped: true };

                    if (!line) return { idx, success: true, empty: true };

                    const prompt = buildTokenizationPrompt(line);
                    let failCount = 0;

                    while (failCount < 3) {
                        try {
                            const rawContent = await callGemini(prompt);
                            const payload = parseGeminiJSON(rawContent);
                            if (!payload.sequence || !payload.dictionary) throw new Error("sequence/dictionary 누락");
                            return { idx, success: true, payload };
                        } catch (err) {
                            failCount++;
                            if (failCount >= 3) return { idx, success: false, err };
                            await new Promise(r => setTimeout(r, 2000)); // 2초 대기 후 재시도
                        }
                    }
                });

                const results = await Promise.all(promises);

                // 결과를 순차적으로 조립 (Race Condition 방지)
                let batchFailed = false;

                for (let res of results) {
                    if (res.skipped) continue;

                    if (!res.success) {
                        console.error(`${res.idx + 1}번 문단 병렬 처리 중 3회 실패:`, res.err);
                        batchFailed = true;
                        continue;
                    }

                    if (res.empty) {
                        const targetIdx = currentJson.sequence.indexOf(`p_${res.idx}`);
                        if (targetIdx !== -1) {
                            currentJson.sequence.splice(targetIdx, 1);
                            delete currentJson.dictionary[`p_${res.idx}`];
                        }
                        if (res.idx < lines.length - 1) {
                            const brId = `br_${res.idx}_${timestamp}`;
                            currentJson.sequence.push(brId);
                            currentJson.dictionary[brId] = { text: "\n", pos: "개행" };
                        }
                        currentJson.last_idx = Math.max(currentJson.last_idx, res.idx);
                    } else if (res.payload) {
                        let newIds = [];
                        res.payload.sequence.forEach((oldId, pIdx) => {
                            const newId = `id_${res.idx}_${pIdx}_${timestamp}`;
                            newIds.push(newId);
                            currentJson.dictionary[newId] = res.payload.dictionary[oldId];
                        });

                        const pId = `p_${res.idx}`;
                        const targetIdx = currentJson.sequence.indexOf(pId);
                        if (targetIdx !== -1) {
                            currentJson.sequence.splice(targetIdx, 1, ...newIds);
                            delete currentJson.dictionary[pId];
                        } else {
                            currentJson.sequence.push(...newIds);
                            if (res.idx < lines.length - 1) {
                                const brId = `br_${res.idx}_${timestamp}`;
                                currentJson.sequence.push(brId);
                                currentJson.dictionary[brId] = { text: "\n", pos: "개행" };
                            }
                        }
                        currentJson.last_idx = Math.max(currentJson.last_idx, res.idx);
                    }
                }

                if (batchFailed) {
                    if (log) log.innerText = `⚠️ 일부 문단 집중 실패. AI 분석이 중단되었습니다.\nReviewer 화면에서 오류 문단을 일괄 복구해주세요.`;
                    currentJson.status = "failed";
                    await sb.from('reading_materials').update({ processed_json: currentJson }).eq('id', id);
                    return;
                }

                // 1개 배치(5문단) 통과 시 DB에 단 1번만 업데이트
                if (batchIndices[batchIndices.length - 1] === lines.length - 1) {
                    currentJson.status = "completed";
                }
                
                await sb.from('reading_materials').update({ processed_json: currentJson }).eq('id', id);

                if (preview) {
                    preview.innerText = `[병렬 처리 완료] ${maxProgress}/${lines.length}\n` + JSON.stringify(currentJson, null, 2);
                    preview.style.display = 'block';
                }
            }

            if (log && failCount < 3) {
                log.innerText = "✅ 전체 문단 분석 완료!";
                log.style.backgroundColor = "#dcfce7";
            }
        }
    </script>
</body>

</html>
