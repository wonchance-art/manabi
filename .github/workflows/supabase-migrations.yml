name: Supabase Migrations

# main에 마이그레이션이 머지되면 Supabase에 자동 적용한다.
# (PR 머지만 하면 DB까지 반영 — SQL Editor 복붙 불필요)
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens 에서 발급한 개인 액세스 토큰
#   SUPABASE_PROJECT_REF   — 프로젝트 ref (대시보드 URL의 .../project/<여기>)
#   SUPABASE_DB_PASSWORD   — 프로젝트 DB 비밀번호 (Settings → Database)
# 셋 다 등록 전에는 이 워크플로가 조용히 건너뜁니다.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: 시크릿 확인 (미설정 시 건너뜀)
        id: guard
        run: |
          if [ -z "$PROJECT_REF" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::notice::Supabase 시크릿 미설정 — 마이그레이션 자동 적용을 건너뜁니다."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.skip != 'true'
        with:
          version: latest

      - name: Link & db push
        if: steps.guard.outputs.skip != 'true'
        run: |
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --password "$SUPABASE_DB_PASSWORD"
