name: Supabase Migrations

# main에 마이그레이션이 머지되면 Supabase에 자동 적용한다.
# (PR 머지만 하면 DB까지 반영 — SQL Editor 복붙 불필요)
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — https://supabase.com/dashboard/account/tokens 에서 발급한 개인 액세스 토큰
#   SUPABASE_PROJECT_REF   — 프로젝트 ref (대시보드 URL의 .../project/<여기>)
#   SUPABASE_DB_PASSWORD   — 프로젝트 DB 비밀번호 (Settings → Database)
# 셋 다 등록 전에는 이 워크플로가 건너뜁니다(실패가 아니라 skip — 포크 PR 고려).
# 단, 조용히 success 로 끝나지 않도록 눈에 띄는 ::warning 과 잡 요약(step summary)을 남긴다.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: 시크릿 확인 (미설정 시 건너뜀 — 눈에 띄게 경고)
        id: guard
        run: |
          if [ -z "$PROJECT_REF" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            # ::warning 은 실행 요약 상단에 노란 배너로 뜬다(notice 보다 눈에 띔).
            echo "::warning title=Supabase 마이그레이션 건너뜀::시크릿 미설정 — DB 자동 적용을 SKIP 했습니다. 마이그레이션은 아직 원격에 반영되지 않았습니다."
            # 잡 요약(Summary 탭)에도 큼직하게 남겨 '조용한 success' 함정을 막는다.
            {
              echo "## ⚠️ SKIPPED — Supabase 마이그레이션 미적용";
              echo "";
              echo "GitHub Secrets(**SUPABASE_ACCESS_TOKEN·SUPABASE_PROJECT_REF·SUPABASE_DB_PASSWORD**)가 설정되지 않아";
              echo "\`supabase db push\` 를 건너뛰었습니다. **DB 는 아직 갱신되지 않았습니다.**";
              echo "Settings → Secrets and variables → Actions 에서 3종을 등록한 뒤 이 워크플로를 재실행하세요.";
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # 건너뛴 사실을 체크 목록에서 한눈에 보이게 — 이 스텝 이름 자체가 상태 표시가 된다.
      - name: '⚠️ 건너뜀: 시크릿 미설정 (DB 미적용)'
        if: steps.guard.outputs.skip == 'true'
        run: echo "Supabase 시크릿 미설정으로 마이그레이션을 적용하지 않았습니다. (실패 아님 — 포크 PR 고려)"

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.skip != 'true'
        with:
          version: latest

      - name: Link & db push
        if: steps.guard.outputs.skip != 'true'
        run: |
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          # push 출력을 캡처해 화면에 그대로 보이면서 가드 검사에 재사용한다.
          set -o pipefail
          supabase db push --password "$SUPABASE_DB_PASSWORD" 2>&1 | tee /tmp/db_push.log

          # 가드: CLI 가 파일명 형식 불일치 등으로 마이그레이션을 조용히 건너뛰면
          # ("Skipping migration ... file name must match pattern") 성공으로 끝나지 않게 실패시킨다.
          # (문자 접미 파일명 재발 방지 — 개명 규약 YYYYMMDDHHMMSS_name.sql 을 강제.)
          if grep -qi "Skipping migration" /tmp/db_push.log; then
            echo "::error title=마이그레이션 스킵 감지::db push 가 일부 마이그레이션을 건너뛰었습니다(파일명 형식 불일치 등). YYYYMMDDHHMMSS_name.sql 규약을 확인하세요."
            exit 1
          fi
